name: MUYUAN Check-in

on:
  schedule:
    # GitHub Actions uses UTC. 22:10 UTC is 06:10 in Asia/Shanghai.
    - cron: "10 22 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run MUYUAN check-in
        run: npm run checkin:muyuan
        env:
          MUYUAN_ACCESS_TOKEN: ${{ secrets.MUYUAN_ACCESS_TOKEN }}
          MUYUAN_USER_ID: ${{ secrets.MUYUAN_USER_ID }}
